# =====================================================================
# Amazon Product Search — Centralized Pipeline Configuration
# =====================================================================
# All pipeline scripts load this file via src/shared/utils/config_loader.py.
# Environment-specific overrides are in config/{env}.yml.
# =====================================================================

pipeline:
  write_mode: overwrite               # snapshot full load each run
  catalog: product_search_dev         # target UC catalog (overridden per env)
  bronze_schema: bronze
  silver_schema: silver
  gold_schema: gold
  operations_schema: operations
  secret_scope: supabase-creds        # Databricks secret scope name
  validation:
    enabled: true                     # enable post-load checks
    abort_on_failure: true            # abort pipeline if critical DQ check fails
  logging:
    enabled: true                     # log execution metrics to operations tables
  retry:
    max_attempts: 3
    backoff_seconds: 60

mlflow:
  enabled: true
  experiment_path: "/Shared/Amazon_Product_Search_ML"
  experiment_name: "Amazon Product Search Accelerator"
  tags:
    project: "Amazon Product Search"

# ── Medallion Settings ────────────────────────────────────────────────
bronze:
  schema: bronze
  amazon_raw_table: amazon_products_raw

silver:
  schema: silver
  amazon_clean_table: amazon_products_clean
  rejected_records_table: operations.rejected_records

gold:
  schema: gold
  catalog_table: amazon_product_catalog
  search_index_name: amazon_product_vs_index
  vector_search_endpoint: product_search_endpoint

# ── Dataset Ingestion Settings ─────────────────────────────────────────
ingestion:
  source_type: "csv"
  default_csv_path: "/Workspace/dataset/V2/Amazon.csv"
  tables:
    - target: "amazon_products_raw"
      primary_key: "product_id"

# ── Search Evaluation Settings ────────────────────────────────────────
evaluation:
  enabled: true
  top_k: 10

# ── Monitoring & Observability Settings ────────────────────────────────
monitoring:
  enabled: true
  alert_thresholds:
    search_latency_ms:
      warning: 1500
      critical: 3000
    vector_index_sync_minutes:
      warning: 30
      critical: 60

# ── Enterprise Governance & Security Settings ──────────────────────────
governance:
  enabled: true
  unity_catalog:
    enforce: true
  secrets:
    scope: supabase-creds
    required:
      - "host|db-host"
      - "port|db-port"
  validation:
    max_query_length: 512
    allow_empty_query: false
