# ── Standalone: Search Evaluation Job ──────────────────────────────────
resources:
  jobs:
    search_evaluation_job:
      name: "[${bundle.environment}] Product Search — Search Evaluation"
      description: "Executes WANDS benchmark queries against the Vector Search index and logs IR metrics to MLflow."
      tasks:
        - task_key: search_evaluation
          max_retries: 1
          environment_key: default
          notebook_task:
            notebook_path: "../../notebooks/09_search_evaluation.py"
            base_parameters:
              catalog: ${var.catalog_name}
              environment: ${var.environment}
              endpoint_name: "product_search_vs_endpoint"
              index_name: "${var.catalog_name}.gold.product_search_catalog_index"
              top_k: "10"
      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - "databricks-vectorsearch"
              - "pyyaml"

